version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: esg-rag-app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./gateway:/app/gateway
      - ./data:/app/data
      - ./training:/app/training
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - esg-network
    restart: unless-stopped
    depends_on:
      - nginx

  nginx:
    image: nginx:latest
    container_name: esg-rag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - esg-network
    depends_on:
      - app
    restart: unless-stopped

networks:
  esg-network:
    driver: bridge
